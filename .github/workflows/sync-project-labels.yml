name: Sync Project Status to Label

on:
  schedule:
    - cron: '* * * */1 *'  # Run every 5 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Project Status to Labels
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const query = `
              query($user:String!, $projectNumber:Int!) {
                user(login: $user) {
                  projectV2(number: $projectNumber) {
                    id
                    title
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          __typename
                          ... on Issue {
                            number
                            repository {
                              nameWithOwner
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            try {
              const result = await github.graphql(query, {
                user: context.repo.owner,
                projectNumber: 9
              });

              const project = result.user.projectV2;
              console.log(`Project: ${project.title}`);
              console.log(`Items found: ${project.items.nodes.length}`);
              
              // Define all possible status labels from your project columns
              const STATUS_LABELS = ["Backlog", "Ready", "In progress", "In review", "Done"];
              
              const items = project.items.nodes;

              for (const item of items) {
                if (!item.content || item.content.__typename !== 'Issue') {
                  continue;
                }

                const issueNumber = item.content.number;
                let statusLabel = null;

                // Extract the Status field value
                const fieldValues = item.fieldValues.nodes;
                for (const fieldValue of fieldValues) {
                  if (fieldValue.field && fieldValue.field.name === 'Status' && fieldValue.name) {
                    statusLabel = fieldValue.name;
                    break;
                  }
                }

                if (!statusLabel) {
                  console.log(`Issue #${issueNumber}: No status found`);
                  continue;
                }

                console.log(`Issue #${issueNumber}: Status = ${statusLabel}`);

                // Get current issue labels
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                const currentLabels = issue.labels.map(l => l.name);
                console.log(`  Current labels: ${currentLabels.join(', ') || 'none'}`);

                // Find and remove old status labels (only status labels, keep other labels)
                const oldStatusLabels = currentLabels.filter(l => STATUS_LABELS.includes(l));
                
                for (const oldLabel of oldStatusLabels) {
                  if (oldLabel !== statusLabel) {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber,
                      name: oldLabel
                    });
                    console.log(`  Removed label: "${oldLabel}"`);
                  }
                }

                // Add the status label if not already present
                if (!currentLabels.includes(statusLabel)) {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    labels: [statusLabel]
                  });
                  console.log(`  Added label: "${statusLabel}"`);
                } else {
                  console.log(`  Already has label: "${statusLabel}"`);
                }
              }

              console.log("Sync completed successfully");
            } catch (error) {
              console.error("Error syncing labels:", error.message);
              throw error;
            }
