name: Sync Project Status to Label

on:
  schedule:
    - cron: '*/5 * * * *'  # Run every 5 minutes
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Project Status to Labels
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const query = `
              query($user:String!, $projectNumber:Int!) {
                user(login: $user) {
                  projectV2(number: $projectNumber) {
                    id
                    title
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          __typename
                          ... on Issue {
                            number
                            repository {
                              nameWithOwner
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            __typename
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            try {
              const result = await github.graphql(query, {
                user: context.repo.owner,
                projectNumber: 9
              });

              const project = result.user.projectV2;
              console.log(`Project: ${project.title}`);
              console.log(`Items found: ${project.items.nodes.length}`);
              
              const items = project.items.nodes;

              for (const item of items) {
                if (!item.content || item.content.__typename !== 'Issue') {
                  continue;
                }

                const issueNumber = item.content.number;
                console.log(`Processing issue #${issueNumber}`);

                // Get current issue labels
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                console.log(`Current labels: ${issue.labels.map(l => l.name).join(', ')}`);
              }

              console.log("Sync completed successfully");
            } catch (error) {
              console.error("Error syncing labels:", error.message);
              throw error;
            }
